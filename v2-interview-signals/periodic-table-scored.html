  <style>
    :root { --ink:#14202b; --muted:#607080; --paper:#f7f2e8; }

    .score-badge.s0 { background:#dc3545; } .score-badge.s1 { background:#e67e22; } .score-badge.s2 { background:#f1c40f; color:var(--ink); } .score-badge.s3 { background:#27ae60; } .score-badge.s4 { background:#2ecc71; }

  <script>
    const data = {"families": {"Voice Delivery": "#18a56a", "Pace & Rhythm": "#1f7fd1", "Pauses & Silence": "#7b61d1", "Fluency": "#00a7b5", "Language Quality": "#f28c28", "Answer Structure": "#e14949", "Specificity": "#d9a900", "Reasoning": "#d94b86", "Conversation Behavior": "#159b8d", "Confidence Signals": "#4758c8", "Role Competency": "#8a633d", "Recording Quality": "#7c8894"}, "signals": [{"code": "Vol", "name": "Volume", "category": "Voice Delivery", "layer": "M", "score": 4, "evidence": "RMS=0.0714"}, {"code": "Var", "name": "Vocal Variety", "category": "Voice Delivery", "layer": "D", "score": 1, "evidence": "The responses show mostly flat delivery with minimal expressive variation. While there are occasional natural pauses and some emphasis on key points like 'high priority' and 'core functionalities,' the overall pattern is monotonous. The candidate uses repetitive phrasing ('instead of,' 'at that point') and shows little vocal dynamics to distinguish between different types of content or emotional states, resulting in delivery that lacks engagement despite solid technical content."}, {"code": "Ste", "name": "Steadiness", "category": "Voice Delivery", "layer": "D", "score": 2, "evidence": "Candidate shows understandable communication but with visible instability - frequent self-corrections ('that made me, that made'), repeated words ('focused focused'), incomplete sentences cutting off mid-thought, and noticeable hesitations ('what I what I did'). Volume and pace appear inconsistent with multiple false starts and recovery attempts throughout responses."}, {"code": "Ton", "name": "Tone", "category": "Voice Delivery", "layer": "J", "score": 2, "evidence": "The candidate shows signs of nervousness through frequent self-corrections ('that made me, that made'), incomplete sentences, repetitive filler words, and trailing off mid-thought. While the content is relevant and shows effort, the delivery lacks confidence and fluency, creating an inconsistent professional tone."}, {"code": "Prj", "name": "Projection", "category": "Voice Delivery", "layer": "D", "score": 3, "evidence": "RMS=0.0714"}, {"code": "En", "name": "Energy", "category": "Voice Delivery", "layer": "J", "score": 2, "evidence": "The candidate shows moderate engagement with thoughtful, detailed responses, but energy level is inconsistent. Some answers demonstrate enthusiasm (learning new technologies, problem-solving), while others feel more mechanical or tired. Speech patterns include hesitations, repetitions, and incomplete thoughts that suggest fatigue or nervousness rather than consistent liveliness."}, {"code": "Clr", "name": "Clarity", "category": "Voice Delivery", "layer": "D", "score": 2, "evidence": "Speech is generally understandable but has frequent disfluencies including repeated words ('focused focused', 'that made me, that made'), incomplete sentences (most answers cut off mid-sentence), false starts, and filler words. While the content can be followed with effort, these issues impede smooth comprehension."}, {"code": "Mon", "name": "Monotony", "category": "Voice Delivery", "layer": "D", "score": 1, "evidence": "The candidate's speech shows minimal variation with repetitive sentence structures, frequent filler words ('that', 'instead of'), and consistent flat delivery patterns. While there are occasional attempts at emphasis, the overall tone remains monotonous with little natural rhythm or engaging vocal variety."}, {"code": "WPM", "name": "Words Per Minute", "category": "Pace & Rhythm", "layer": "M", "score": 4, "evidence": "Avg WPM=135.3"}, {"code": "Acc", "name": "Acceleration", "category": "Pace & Rhythm", "layer": "M", "score": 0, "evidence": "Avg accel=0.0 WPM"}, {"code": "Dec", "name": "Deceleration", "category": "Pace & Rhythm", "layer": "M", "score": 0, "evidence": "Avg decel=-0.0 WPM"}, {"code": "Rus", "name": "Rushing", "category": "Pace & Rhythm", "layer": "D", "score": 4, "evidence": "Avg WPM=135.3"}, {"code": "Drg", "name": "Dragging", "category": "Pace & Rhythm", "layer": "D", "score": 3, "evidence": "Avg WPM=135.3"}, {"code": "Pac", "name": "Pace Control", "category": "Pace & Rhythm", "layer": "D", "score": 3, "evidence": "Avg WPM=135.3"}, {"code": "Rhy", "name": "Rhythm", "category": "Pace & Rhythm", "layer": "D", "score": 4, "evidence": "Spread=8.0"}, {"code": "FP", "name": "Filled Pause", "category": "Pauses & Silence", "layer": "M", "score": 4, "evidence": "Fillers=6"}, {"code": "HP", "name": "Hesitation Pause", "category": "Pauses & Silence", "layer": "M+D", "score": 4, "evidence": "HP count=4"}, {"code": "Lat", "name": "Latency", "category": "Pauses & Silence", "layer": "M", "score": 0, "evidence": "Avg=12.65s"}, {"code": "Sil", "name": "Long Silence", "category": "Pauses & Silence", "layer": "M", "score": 2, "evidence": "Long pauses=2"}, {"code": "OP", "name": "Owned Pause", "category": "Pauses & Silence", "layer": "D", "score": 3, "evidence": "Owned=5"}, {"code": "RP", "name": "Recovery Pause", "category": "Pauses & Silence", "layer": "D", "score": 2, "evidence": "Candidate shows mixed recovery patterns - some pauses lead to successful continuation (Answer 3, 5) while others result in repetition or incomplete thoughts (Answer 1 cuts off, Answer 2 has 'that made me, that made'). Recovery is inconsistent rather than reliable."}, {"code": "Pau", "name": "Pause Quality", "category": "Pauses & Silence", "layer": "D", "score": 2, "evidence": "Mixed pause quality with some concerning patterns. While the average latency of 21.1s suggests thoughtful consideration, 2 long pauses (2.5s+) out of 9 total indicates some struggle with fluency. The candidate shows repetitive phrases ('that made me, that made'), incomplete thoughts, and some awkward hesitations, but also demonstrates organized thinking and coherent responses overall."}, {"code": "FS", "name": "False Starts", "category": "Fluency", "layer": "M", "score": 4, "evidence": "FS=8"}, {"code": "Rep", "name": "Repetition", "category": "Fluency", "layer": "M", "score": 4, "evidence": "Repeats=4"}, {"code": "SC", "name": "Self-Correct", "category": "Fluency", "layer": "M+D", "score": 2, "evidence": "Corrections=37"}, {"code": "Run", "name": "Run-On Speech", "category": "Fluency", "layer": "D", "score": 4, "evidence": "Run-on turns=0"}, {"code": "Frag", "name": "Fragments", "category": "Fluency", "layer": "M+D", "score": 4, "evidence": "Fragments=4"}, {"code": "Flo", "name": "Speech Flow", "category": "Fluency", "layer": "D", "score": 3, "evidence": "Speech flows smoothly with clear, coherent thoughts and good sentence structure. Minor disruptions include occasional fillers and one notable repeat ('that made me, that made'), but overall maintains strong narrative flow and demonstrates good verbal organization skills."}, {"code": "Coh", "name": "Cohesion", "category": "Fluency", "layer": "D+J", "score": 2, "evidence": "Basic sequential flow with noticeable gaps and repetitive patterns. Ideas connect within individual responses but transitions between concepts are often abrupt. Frequent use of 'instead of' creates some coherence, but overall structure lacks smooth progression and sophisticated linking between related ideas."}, {"code": "Conn", "name": "Connector Words", "category": "Fluency", "layer": "M+J", "score": 2, "evidence": "Basic=192"}, {"code": "Grm", "name": "Grammar", "category": "Language Quality", "layer": "D+J", "score": 3, "evidence": "Mostly accurate grammar with good use of complex structures. Minor issues include occasional repetition ('focused focused'), incomplete sentences due to cutoffs, and some awkward phrasing ('everything together', 'what I what I did'). However, meaning is consistently clear and the candidate demonstrates strong control of tenses, conditionals, and complex sentence structures throughout."}, {"code": "Ten", "name": "Tense", "category": "Language Quality", "layer": "M+J", "score": 3, "evidence": "The candidate demonstrates mostly accurate tense use with appropriate shifts between past tense for experiences and present/conditional tenses for general approaches. Minor issues include some repetitive phrasing ('I used to break' could be 'I would break') and occasional awkward constructions, but tense errors don't impede comprehension and the temporal relationships are clear throughout."}, {"code": "SVA", "name": "Agreement", "category": "Language Quality", "layer": "M+J", "score": 3, "evidence": "The candidate demonstrates mostly correct subject-verb agreement throughout their responses. There are occasional minor errors like 'I focused focused' (repetition) and some awkward phrasing, but the vast majority of sentences show proper agreement between subjects and verbs. The errors present don't impede understanding and the overall grammar is strong."}, {"code": "Sent", "name": "Sentence", "category": "Language Quality", "layer": "D+J", "score": 2, "evidence": "Sentences are mostly understandable but frequently incomplete or cut off mid-thought. Several answers end abruptly (answers 1, 2, 3, 4, 6, 7, 8), there are repetitive phrases ('that made me, that made'), and some grammatical issues. While the content is coherent and shows good structure within complete sentences, the frequent incomplete endings significantly impact overall sentence quality."}, {"code": "Voc", "name": "Vocabulary", "category": "Language Quality", "layer": "D+J", "score": 3, "evidence": "Demonstrates varied and appropriate vocabulary with technical terms (MERN stack, Firebase authentication, leaflet.js, API connectivity) and professional language (prioritize, proactive planning, dependency, usability). Shows good range across academic, technical, and workplace contexts. Some minor repetition and basic phrasing prevent a perfect score, but overall vocabulary is well-suited for technical interviews."}, {"code": "Reg", "name": "Register", "category": "Language Quality", "layer": "J", "score": 2, "evidence": "Language is generally appropriate for an interview context with professional vocabulary and structured responses. However, there are notable inconsistencies including repetitive phrases ('instead of'), incomplete sentences (answers 1, 2, 3, 4), stuttering/self-corrections ('I focused focused', 'that made me, that made', 'What I what I did'), and some awkward phrasing. While the content demonstrates competence, the delivery lacks the polish expected in a professional interview setting."}, {"code": "Tech", "name": "Technical", "category": "Language Quality", "layer": "J", "score": 3, "evidence": "Candidate demonstrates natural use of relevant technical vocabulary (MERN stack, Firebase authentication, leaflet.js, API connectivity, database operations, UI improvements, debugging) with appropriate context. Terms are used correctly and conversationally rather than forced. While not highly specialized or deep, the technical language aligns well with the web development domain and shows practical understanding."}, {"code": "Idi", "name": "Idioms", "category": "Language Quality", "layer": "J", "score": 2, "evidence": "Shows some natural phrasing like 'I had no option but' and 'one step at a time,' but frequently uses awkward constructions ('during one phase of my semester,' 'everything together,' 'what to sacrifice and what to protect'). Contains repetitive filler words, incomplete sentences, and non-idiomatic expressions that indicate intermediate English proficiency rather than natural fluency."}, {"code": "RepW", "name": "Word Repeat", "category": "Language Quality", "layer": "M", "score": 0, "evidence": "Repeat words=928"}, {"code": "Pwr", "name": "Power Words", "category": "Language Quality", "layer": "J", "score": 2, "evidence": "Candidate uses some specific technical terms (MERN stack, Firebase, authentication) and action words (prioritize, focus, implement), but language is often generic with weak phrases like 'one thing that helped me,' 'I think I would,' and repetitive filler words. Lacks strong, impactful vocabulary and confident delivery."}, {"code": "Gap", "name": "Working Around Gaps", "category": "Language Quality", "layer": "D+J", "score": 3, "evidence": "Candidate consistently uses effective circumlocution strategies when lacking specific vocabulary. Uses phrases like 'prescriptive project' instead of technical terms, 'what to sacrifice and what to protect' for prioritization concepts, and 'mentally tired' for stress/burnout. Successfully conveys meaning through descriptive explanations and alternative phrasing, though occasionally relies on basic vocabulary where more precise terms might exist."}, {"code": "Str", "name": "Structure", "category": "Answer Structure", "layer": "D+J", "score": 1, "evidence": "Answers are scattered and incomplete with frequent cut-offs mid-sentence. While some contain relevant content, they lack clear structure with no discernible beginning/middle/end organization. Most responses trail off without proper conclusions, creating a fragmented communication pattern."}, {"code": "Ctx", "name": "Context", "category": "Answer Structure", "layer": "J", "score": 3, "evidence": "Clear context provided with specific situation (final semester managing academics, internship, and MERN stack project), defined role (student/intern/developer), and concrete tasks (debugging, authentication fixes, UI improvements, project deadlines). While detailed, lacks highly specific verifiable details like exact dates, company names, or project specifications that would merit a 4."}, {"code": "Act", "name": "Action", "category": "Answer Structure", "layer": "J", "score": 3, "evidence": "Candidate demonstrates clear personal actions with specific strategies like task prioritization, breaking work into smaller goals, maintaining daily schedules, and making deliberate trade-offs. Shows ownership of decisions and outcomes. However, some responses are incomplete and could be more precise about specific methodologies or measurable results."}, {"code": "Res", "name": "Result", "category": "Answer Structure", "layer": "J", "score": 2, "evidence": "Results are mentioned but lack specificity and quantification. The candidate describes general outcomes like 'made workload feel more manageable,' 'stayed focused,' and 'maintained structured schedule,' but doesn't provide concrete metrics, specific achievements, or measurable impacts of their actions during these high-pressure situations."}, {"code": "Ex", "name": "Example", "category": "Answer Structure", "layer": "J", "score": 2, "evidence": "Real example of managing academic work, internship, and MERN stack project with competing deadlines. Shows actual prioritization decisions and specific context. However, lacks precise details, measurable outcomes, and deeper competency demonstration that would make it truly compelling."}, {"code": "STAR", "name": "STAR", "category": "Answer Structure", "layer": "C", "score": 2, "evidence": "Clear situations described (managing multiple deadlines, project pressure) and specific actions taken (prioritizing, breaking tasks down, taking breaks). However, tasks are implied rather than explicitly stated, and concrete results/outcomes are missing. Answers focus more on process than measurable impact."}, {"code": "Rel", "name": "Relevance", "category": "Answer Structure", "layer": "J", "score": 3, "evidence": "The candidate consistently provides direct, relevant answers with specific examples from their academic/internship experience. Each response addresses the exact question asked with concrete details about prioritization strategies, stress management, lessons learned, trade-offs made, and health impacts. While the answers are well-targeted and include good examples, they don't quite reach the level of connecting to broader professional principles or frameworks."}, {"code": "Drf", "name": "Drift", "category": "Answer Structure", "layer": "J", "score": 3, "evidence": "Answers consistently address the questions asked and build logically on previous responses. Each answer stays focused on the core topic (prioritization under pressure, stress management, lessons learned). Minor issues include some incomplete sentences (A1, A2 cut off) and occasional brief tangents, but overall maintains strong topical coherence throughout the interview flow."}, {"code": "Ver", "name": "Verifiable", "category": "Specificity", "layer": "J", "score": 2, "evidence": "Answers contain some specific technical details (MERN stack, authentication, API connectivity, database operations) and concrete project elements (prescriptive project, internship work, academic submissions) that could potentially be verified. However, most claims lack precise details like specific timeframes, exact deadlines, measurable outcomes, or verifiable institutional contexts that would make them easily checkable."}, {"code": "Step", "name": "Steps", "category": "Specificity", "layer": "J", "score": 3, "evidence": "Clear step-by-step process demonstrated: lists tasks by urgency/impact/deadlines, breaks large tasks into smaller goals, prioritizes high-impact items first, takes structured breaks, and evaluates based on core functionality needs. Shows systematic approach but lacks comprehensive follow-up systems or detailed change implementation strategies."}, {"code": "Num", "name": "Numbers", "category": "Specificity", "layer": "M+J", "score": 1, "evidence": "Only contains vague quantities like 'one phase', 'one situation', 'multiple deadlines', 'a few days' without any specific metrics, dates, amounts, or measurable outcomes that would demonstrate concrete impact or scale."}, {"code": "Nam", "name": "Names", "category": "Specificity", "layer": "M+J", "score": 1, "evidence": "Only one specific technical term (MERN stack) is mentioned. The candidate uses vague references like 'prescriptive project', 'internship work', and 'academic submissions' without naming specific companies, projects, tools, or organizations. Answers lack concrete, verifiable details that would make experiences more credible."}, {"code": "Det", "name": "Detail", "category": "Specificity", "layer": "J", "score": 2, "evidence": "Answers provide enough detail to understand the situation and approach, but lack specific examples, metrics, or concrete details. The candidate mentions general strategies like 'prioritizing tasks' and 'breaking down work' but doesn't provide precise timelines, specific project names, exact deadlines, or quantifiable outcomes that would recreate the actual situation."}, {"code": "Con", "name": "Concrete", "category": "Specificity", "layer": "J", "score": 3, "evidence": "The candidate provides mostly concrete language with specific examples (MERN stack projects, authentication fixes, UI improvements, appointment booking flow, API connectivity), clear timeframes (final phase, semester period), and detailed processes (listing tasks by urgency, breaking into smaller goals, taking short breaks). However, some responses contain incomplete thoughts and occasional vague phrases like 'one thing that helped me a lot' and 'maintaining better balance,' preventing a perfect score."}, {"code": "Why", "name": "Reasoning", "category": "Reasoning", "layer": "J", "score": 3, "evidence": "Candidate demonstrates clear reasoning behind actions with specific criteria (urgency, impact, deadlines, dependencies, user experience) and logical decision-making processes. Shows some insight about energy management and proactive planning, but reasoning could be deeper with more sophisticated analysis of trade-offs and systematic approaches."}, {"code": "C&E", "name": "Cause/Effect", "category": "Reasoning", "layer": "J", "score": 2, "evidence": "Shows simple cause-effect connections (prioritizing tasks led to better management, taking breaks improved focus) but lacks depth in explaining mechanisms or broader impact chains. Most answers describe what happened rather than analyzing why specific actions produced particular outcomes."}, {"code": "Opt", "name": "Options", "category": "Reasoning", "layer": "J", "score": 2, "evidence": "The candidate implies some alternatives (like working continuously vs. taking breaks, handling everything independently vs. delegating, waiting vs. early planning) but doesn't explicitly compare multiple options or clearly explain why their chosen approach was superior to other alternatives. Most responses describe their actions without detailing the decision-making process between different approaches."}, {"code": "Trd", "name": "Tradeoffs", "category": "Reasoning", "layer": "J", "score": 2, "evidence": "The candidate shows basic tradeoff awareness by mentioning sacrificing free time and entertainment for project work, and recognizing that continuous long hours reduced focus and productivity. However, they don't provide clear explanations of what was specifically gained versus lost in their decisions, or demonstrate deeper understanding of the consequences and alternatives considered."}, {"code": "Jud", "name": "Judgment", "category": "Reasoning", "layer": "J", "score": 3, "evidence": "Candidate demonstrates deliberate informed choices with clear ownership. Shows specific prioritization decisions (core functionalities over UI enhancements), acknowledges trade-offs (sacrificing free time), and owns learning outcomes (would start planning earlier). Takes responsibility for consequences without deflection, though could be stronger in articulating deeper strategic reasoning."}, {"code": "Ins", "name": "Insight", "category": "Reasoning", "layer": "J", "score": 2, "evidence": "The candidate demonstrates simple insights about time management and prioritization (breaking tasks down, planning earlier, balancing work/rest) but lacks deeper reflection on underlying principles or transferable frameworks. The insights are practical but remain at a surface level without exploring broader lessons about decision-making, stress management, or professional development that could apply across different contexts."}, {"code": "Ref", "name": "Reflection", "category": "Reasoning", "layer": "J", "score": 3, "evidence": "The candidate demonstrates specific reflection with concrete changes implemented. They identify key learnings like proactive planning, energy management over continuous work, and structured prioritization systems. However, while they show clear behavioral changes from the experience, the reflection stops short of deeper generative insights that would fundamentally transform their approach to similar challenges in the future."}, {"code": "Beyond", "name": "Goes Beyond", "category": "Reasoning", "layer": "J", "score": 2, "evidence": "The candidate provides simple lessons and follow-up actions (like starting planning earlier, breaking tasks into smaller goals, taking breaks) but lacks deeper insights or memorable principles. The responses show basic reflection but don't demonstrate sophisticated thinking or systematic behavioral changes that would indicate higher-level learning."}, {"code": "Adp", "name": "Adaptability", "category": "Conversation Behavior", "layer": "J", "score": 2, "evidence": "Candidate shows basic adaptability by providing relevant responses to follow-up questions and expanding on different aspects of their experience. However, responses contain incomplete sentences, repetitive phrasing, and lack smooth transitions between topics. While they can adjust to new directions in questioning, the execution is somewhat disjointed and requires interviewer patience."}, {"code": "Ask", "name": "Clarifying", "category": "Conversation Behavior", "layer": "M+J", "score": 0, "evidence": "The candidate never asks any clarifying questions throughout the interview responses. They provide detailed answers but don't seek clarification when prompts might be unclear or ambiguous, missing opportunities to better understand what the interviewer is looking for."}, {"code": "B&F", "name": "Back/Forth", "category": "Conversation Behavior", "layer": "J", "score": 2, "evidence": "Candidate demonstrates basic conversational ability with a balanced turn ratio (0.49), but answers show incomplete thoughts, repetitive phrasing, and abrupt endings suggesting difficulty maintaining natural flow without interviewer guidance to redirect or prompt continuation."}, {"code": "Lis", "name": "Listening", "category": "Conversation Behavior", "layer": "J", "score": 3, "evidence": "Candidate consistently understands and responds directly to each question. Shows good comprehension by addressing specific elements mentioned (staying calm, learning from experience, protecting quality, sacrificing free time). Responses are relevant and build logically on previous answers, though some answers appear cut off mid-sentence."}, {"code": "Ans", "name": "Responsive", "category": "Conversation Behavior", "layer": "J", "score": 3, "evidence": "Candidate consistently provides direct, relevant answers to each question with specific examples and concrete details. Responses directly address what was asked (prioritization methods, stress strategies, lessons learned, sacrifice decisions, feature evaluation criteria, and health management). While some answers appear cut off, the portions provided show clear directness and relevance to the prompts."}, {"code": "Turn", "name": "Turn-Taking", "category": "Conversation Behavior", "layer": "M+J", "score": 4, "evidence": "Perfect turn-taking with zero overlapping segments and 0.0s overlap duration. All answers are complete, well-structured responses without interruptions or awkward timing. The candidate demonstrates excellent interview etiquette by waiting for questions to finish and providing thoughtful, uninterrupted responses."}, {"code": "Rec", "name": "Recovery", "category": "Conversation Behavior", "layer": "D+J", "score": 2, "evidence": "Candidate shows some recovery ability but inconsistently. Multiple answers end abruptly mid-sentence (answers 1, 2, 4, 5), suggesting difficulty completing thoughts under pressure. However, they do demonstrate ability to redirect and continue with coherent responses in answers 3 and 6. Recovery is present but slow and incomplete in most instances."}, {"code": "Trust", "name": "Trust", "category": "Confidence Signals", "layer": "J", "score": 2, "evidence": "The candidate demonstrates genuine experience and self-awareness about managing pressure and prioritization, but several factors reduce trustworthiness: multiple incomplete sentences (answers cut off mid-thought), some repetitive content, and occasional unclear explanations. While the core experiences seem authentic and the candidate shows good reflection on lessons learned, the delivery issues and lack of specific concrete details make the responses feel somewhat inconsistent and harder to fully trust."}, {"code": "Pres", "name": "Presence", "category": "Confidence Signals", "layer": "J", "score": 2, "evidence": "Candidate shows technical knowledge and relevant experience but demonstrates inconsistent communication with frequent false starts, incomplete sentences, and repetitive phrasing. While the content is substantive, the delivery lacks the polish and confidence expected in professional settings."}, {"code": "Hold", "name": "Pressure Hold", "category": "Confidence Signals", "layer": "D+J", "score": 2, "evidence": "Candidate shows wobbling under pressure with incomplete sentences, repetitive phrases ('that made me, that made'), and trailing off mid-thought in multiple answers. However, the core meaning and problem-solving approach remain coherent throughout, demonstrating they can maintain substantive responses despite verbal stumbles when difficulty increases."}, {"code": "Recv", "name": "Recovery Speed", "category": "Confidence Signals", "layer": "D", "score": 2, "evidence": "Candidate shows recovery after visible struggle - multiple incomplete sentences, repetitive phrases ('that made me, that made'), and mid-sentence cutoffs indicate initial disruption, but they do regain composure and provide coherent responses in later answers about prioritization and energy management."}, {"code": "Own", "name": "Ownership", "category": "Confidence Signals", "layer": "J", "score": 3, "evidence": "Candidate demonstrates clear personal ownership with consistent use of 'I' statements, takes responsibility for decisions and outcomes, and shows learning from experiences. However, lacks specific quantified impacts or deeper reflection on personal accountability that would warrant a perfect score."}, {"code": "Conf", "name": "Confidence", "category": "Confidence Signals", "layer": "C", "score": 2, "evidence": "Shows some confidence in describing experiences and problem-solving approaches, but exhibits inconsistent delivery with frequent speech disruptions, incomplete sentences, and repetitive phrasing. While content demonstrates self-awareness and learning, the presentation lacks the smooth composure expected of higher confidence levels."}, {"code": "Nerv", "name": "Nervousness", "category": "Confidence Signals", "layer": "D+J", "score": 2, "evidence": "Candidate shows noticeable nervousness through repeated words ('focused focused', 'that made me, that made'), incomplete sentences cutting off mid-thought in multiple answers, and some verbal stumbling. However, the low filler rate (0.2/100w) and generally coherent responses indicate the nervousness is manageable and doesn't severely impact communication."}, {"code": "Imp", "name": "Impact", "category": "Role Competency", "layer": "J", "score": 2, "evidence": "Candidate mentions basic outcomes like 'completing high priority work first', 'made workload feel more manageable', and 'maintaining better balance', but lacks specific quantification or meaningful metrics. No concrete numbers, percentages, or measurable results are provided to demonstrate the actual impact of their actions."}, {"code": "Lead", "name": "Leadership", "category": "Role Competency", "layer": "J", "score": 2, "evidence": "Shows basic initiative in self-management and personal project prioritization, but lacks evidence of leading, influencing, or guiding others. Responses focus entirely on individual task management and personal productivity rather than leadership behaviors involving other people."}, {"code": "Prof", "name": "Maturity", "category": "Role Competency", "layer": "J", "score": 3, "evidence": "Demonstrates sound professional judgment through systematic prioritization based on impact and deadlines, proactive planning mindset, and mature self-reflection on work-life balance. Shows accountability by acknowledging areas for improvement and learning from experience. Professional approach to managing competing demands across academic, internship, and project work indicates strong workplace readiness."}, {"code": "Prob", "name": "Problem Solve", "category": "Role Competency", "layer": "J", "score": 3, "evidence": "Demonstrates clear problem-solving process with specific examples: prioritization by urgency/impact/deadlines, breaking large tasks into smaller goals, structured scheduling, and energy management. Shows ability to handle multiple constraints (academics, internship, projects) and adapt strategies when initial approaches weren't working. Includes reflection and learning for future situations. Missing deeper analysis of trade-offs and measurable outcomes for a score of 4."}, {"code": "Coll", "name": "Collab", "category": "Role Competency", "layer": "J", "score": 0, "evidence": "All answers focus exclusively on individual work management, time prioritization, and personal productivity strategies. No mention of working with team members, collaborating with others, or any group-based activities despite multiple opportunities to discuss teamwork experiences."}, {"code": "Learn", "name": "Learnability", "category": "Role Competency", "layer": "J", "score": 3, "evidence": "Candidate demonstrates specific learning behaviors with concrete examples of adapting approaches based on experience. Shows clear progression from initial struggles (working long hours continuously) to improved methods (structured breaks, energy management). Provides specific lessons learned about proactive planning and early prioritization. However, falls short of score 4 as the examples don't show systematic habit changes or measurable results from learning."}, {"code": "Comp", "name": "Competency", "category": "Role Competency", "layer": "C", "score": 3, "evidence": "Candidate demonstrates clear role-relevant behavior with systematic prioritization methods (urgency/impact assessment), practical stress management techniques (breaking tasks down, structured scheduling), and self-awareness for improvement. Shows ownership of decisions and learning from experience, though lacks specific quantifiable outcomes or broader organizational impact that would indicate strongest competency level."}, {"code": "Dia", "name": "Diarization", "category": "Recording Quality", "layer": "M", "score": 4, "evidence": "Speakers=2"}, {"code": "SNR", "name": "Signal-To-Noise Ratio", "category": "Recording Quality", "layer": "M", "score": 4, "evidence": "SNR=92.9dB"}, {"code": "Drop", "name": "Dropouts", "category": "Recording Quality", "layer": "M", "score": 0, "evidence": "Zero frames=4881"}, {"code": "Clip", "name": "Clipping", "category": "Recording Quality", "layer": "M", "score": 4, "evidence": "Clip ratio=0.0000"}, {"code": "Mic", "name": "Mic Quality", "category": "Recording Quality", "layer": "M", "score": 3, "evidence": "RMS=0.0714"}, {"code": "Noi", "name": "Noise", "category": "Recording Quality", "layer": "M", "score": 4, "evidence": "Noise floor=0.0000"}]};
    const families = data.families;
    const signals = data.signals;
    const byCategory = signals.reduce((acc, s) => { (acc[s.category] ||= []).push(s); return acc; }, {});
    const avg = (items) => items.length ? items.reduce((sum, s) => sum + s.score, 0) / items.length : 0;
    const esc = (value) => String(value ?? "").replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
    const fmt = (value, digits = 1) => value.toFixed(digits);
    const overall = avg(signals);
    document.getElementById("summary-bar").innerHTML = `
      <div class="summary-item"><span class="label">Overall</span><span class="value">${fmt(overall, 2)}/4</span><div class="bar"><div class="bar-fill" style="width:${overall / 4 * 100}%"></div></div></div>
      ${Object.entries(families).map(([cat, color]) => { const value = avg(byCategory[cat] || []); return `<div class="summary-item"><span class="label">${cat.split(' ')[0]}</span><span class="value">${fmt(value)}</span><div class="bar"><div class="bar-fill" style="width:${value / 4 * 100}%;background:${color}"></div></div></div>`; }).join('')}`;
    const table = document.getElementById("table");
    let count = 0;
    Object.entries(families).forEach(([family, color]) => {
      const group = document.createElement("div");
      group.className = "group";
      group.style.setProperty("--c", color);
      (byCategory[family] || []).forEach((s) => {
        count += 1;
        const tile = document.createElement("article");
        tile.className = "tile";
        tile.style.setProperty("--c", color);
        tile.innerHTML = `<div class="tile-fill s${s.score}"></div><div class="tile-header"><div class="layer">${esc(s.layer)}</div><div class="score-badge s${s.score}">${s.score}</div></div><div class="num">${String(count).padStart(2, "0")}</div><div class="sym">${esc(s.code)}</div><div class="name">${esc(s.name)}</div><div class="evidence" title="${esc(s.evidence)}">${esc(s.evidence)}</div>`;
        group.appendChild(tile);
      });
      const title = document.createElement("div");
      title.className = "group-title";
      title.textContent = family;
      group.appendChild(title);
      const avgEl = document.createElement("div");
      avgEl.className = "group-avg";
      avgEl.textContent = `avg ${fmt(avg(byCategory[family] || []))}`;
      group.appendChild(avgEl);
      table.appendChild(group);
    });
    document.getElementById("count").textContent = `v2 Scored · ${signals.length} elements`;
  </script>
